<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0E1A">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="歌詞通">
<title>歌詞通 · Song Lyric Translator</title>
<style>
  :root {
    --bg: #0B0E1A;
    --surface: #151A2E;
    --surface-2: #1C2340;
    --neon: #FF4D8F;
    --neon-dim: rgba(255, 77, 143, 0.35);
    --gold: #F5C05A;
    --text: #EDEFF7;
    --muted: #8A90A8;
    --line: rgba(255,255,255,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, "Noto Sans", "PingFang HK", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Header ---------- */
  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,77,143,0.06), transparent);
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand-zh {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--neon);
    text-shadow: 0 0 18px var(--neon-dim), 0 0 40px rgba(255,77,143,0.15);
    font-family: "PingFang HK", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }
  .brand-en {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    gap: 10px;
  }
  .roman-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
  }
  .roman-toggle button {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .roman-toggle button.active {
    background: var(--gold);
    color: #14100A;
    font-weight: 600;
  }
  #clearBtn {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
  }

  /* ---------- Lyric feed ---------- */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 140px;
    -webkit-overflow-scrolling: touch;
  }
  .empty-state {
    text-align: center;
    margin-top: 14vh;
    color: var(--muted);
    padding: 0 24px;
  }
  .empty-state .big { font-size: 44px; margin-bottom: 14px; opacity: 0.9; }
  .empty-state p { font-size: 14px; line-height: 1.7; }
  .empty-state .hint { font-size: 12px; margin-top: 14px; opacity: 0.7; }

  .lyric-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--neon);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .lyric-roman {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    min-height: 16px;
    font-style: italic;
  }
  .lyric-zh {
    font-size: 22px;
    line-height: 1.45;
    font-family: "PingFang HK", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    margin-bottom: 6px;
  }
  .lyric-en {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
    min-height: 18px;
  }
  .lyric-card.pending .lyric-roman,
  .lyric-card.pending .lyric-en { opacity: 0.5; }
  .spinner-dots::after {
    content: "…";
    animation: dots 1.2s infinite steps(4);
  }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "…"; } }

  .interim {
    color: var(--muted);
    font-size: 18px;
    padding: 4px 16px 10px;
    font-family: "PingFang HK", "Noto Sans TC", sans-serif;
    opacity: 0.75;
  }

  /* ---------- Footer / mic ---------- */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px calc(18px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent, var(--bg) 35%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #micBtn {
    width: 74px; height: 74px;
    border-radius: 50%;
    border: 2px solid var(--neon);
    background: var(--surface-2);
    color: var(--neon);
    font-size: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    box-shadow: 0 0 0 0 var(--neon-dim);
  }
  #micBtn.listening {
    background: var(--neon);
    color: #fff;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--neon-dim); }
    70%  { box-shadow: 0 0 0 22px rgba(255,77,143,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,77,143,0); }
  }
  #statusText {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    min-height: 15px;
    text-align: center;
  }
  .error-banner {
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,80,80,0.3);
    color: #FF9B9B;
    font-size: 13px;
    border-radius: 10px;
    padding: 10px 14px;
    margin: 10px 16px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-zh">歌詞通</span>
    <span class="brand-en">Cantonese Song Translator</span>
  </div>
  <div class="controls-row">
    <div class="roman-toggle" role="tablist" aria-label="Romanization system">
      <button id="jyutBtn" class="active">Jyutping</button>
      <button id="pinBtn">Pinyin</button>
    </div>
    <button id="clearBtn">Clear</button>
  </div>
</header>

<div class="error-banner" id="errorBanner"></div>

<main id="feed">
  <div class="empty-state" id="emptyState">
    <div class="big">🎤</div>
    <p>Tap the mic and hold your phone near the speaker.<br>
    Each line the mic picks up appears here with its romanization and English meaning.</p>
    <p class="hint">Works best with clear vocals and low background instrumentation. Use Chrome on Android.</p>
  </div>
  <div class="interim" id="interim"></div>
</main>

<footer>
  <button id="micBtn" aria-label="Start or stop listening">&#127908;</button>
  <div id="statusText">Tap to start listening</div>
</footer>

<script>
(function () {
  const micBtn = document.getElementById('micBtn');
  const statusText = document.getElementById('statusText');
  const feed = document.getElementById('feed');
  const interimEl = document.getElementById('interim');
  const emptyState = document.getElementById('emptyState');
  const errorBanner = document.getElementById('errorBanner');
  const jyutBtn = document.getElementById('jyutBtn');
  const pinBtn = document.getElementById('pinBtn');
  const clearBtn = document.getElementById('clearBtn');

  let romanMode = 'jyutping'; // or 'pinyin'
  let listening = false;
  let recognition = null;
  let translateQueue = [];
  let queueBusy = false;
  let cardId = 0;
  const cards = {}; // id -> {el, data}

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 8000);
  }

  /* ---------- Romanization toggle ---------- */
  function setRomanMode(mode) {
    romanMode = mode;
    jyutBtn.classList.toggle('active', mode === 'jyutping');
    pinBtn.classList.toggle('active', mode === 'pinyin');
    Object.values(cards).forEach(({ el, data }) => {
      if (data && (data.jyutping || data.pinyin)) {
        el.querySelector('.lyric-roman').textContent =
          mode === 'jyutping' ? (data.jyutping || '') : (data.pinyin || '');
      }
    });
  }
  jyutBtn.onclick = () => setRomanMode('jyutping');
  pinBtn.onclick = () => setRomanMode('pinyin');

  clearBtn.onclick = () => {
    Object.values(cards).forEach(({ el }) => el.remove());
    for (const k in cards) delete cards[k];
    emptyState.style.display = 'block';
  };

  /* ---------- Speech recognition ---------- */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showError('Speech recognition is not supported in this browser. Please use Chrome on Android.');
    micBtn.disabled = true;
  }

  function buildRecognition() {
    const r = new SR();
    r.lang = 'yue-Hant-HK';       // Cantonese (Hong Kong)
    r.continuous = true;
    r.interimResults = true;
    r.maxAlternatives = 1;

    r.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        const text = res[0].transcript.trim();
        if (!text) continue;
        if (res.isFinal) {
          addLyricLine(text);
        } else {
          interim += text;
        }
      }
      interimEl.textContent = interim;
    };

    r.onerror = (e) => {
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        showError('Microphone access denied. Allow mic permission in your browser settings.');
        stopListening();
      } else if (e.error === 'no-speech') {
        // ignore; onend will restart
      } else if (e.error === 'network') {
        showError('Speech service network error - check your connection.');
      }
    };

    r.onend = () => {
      // Android Chrome stops after silence; auto-restart while active
      if (listening) {
        try { r.start(); } catch (err) { /* already started */ }
      }
    };
    return r;
  }

  function startListening() {
    if (!SR) return;
    recognition = buildRecognition();
    try {
      recognition.start();
      listening = true;
      micBtn.classList.add('listening');
      micBtn.innerHTML = '&#9632;';
      statusText.textContent = 'Listening… hold phone near the speaker';
    } catch (err) {
      showError('Could not start the microphone: ' + err.message);
    }
  }

  function stopListening() {
    listening = false;
    if (recognition) { try { recognition.stop(); } catch (e) {} }
    micBtn.classList.remove('listening');
    micBtn.innerHTML = '&#127908;';
    statusText.textContent = 'Tap to start listening';
    interimEl.textContent = '';
  }

  micBtn.onclick = () => listening ? stopListening() : startListening();

  /* ---------- Lyric cards ---------- */
  function addLyricLine(zhText) {
    emptyState.style.display = 'none';
    const id = ++cardId;
    const el = document.createElement('div');
    el.className = 'lyric-card pending';
    el.innerHTML =
      '<div class="lyric-roman spinner-dots"></div>' +
      '<div class="lyric-zh"></div>' +
      '<div class="lyric-en spinner-dots"></div>';
    el.querySelector('.lyric-zh').textContent = zhText;
    feed.insertBefore(el, interimEl);
    cards[id] = { el, data: null };
    el.scrollIntoView({ behavior: 'smooth', block: 'end' });

    translateQueue.push({ id, zhText });
    processQueue();
  }

  /* ---------- Claude translation queue ---------- */
  async function processQueue() {
    if (queueBusy || translateQueue.length === 0) return;
    queueBusy = true;
    const job = translateQueue.shift();
    try {
      const data = await translateLine(job.zhText);
      const card = cards[job.id];
      if (card) {
        card.data = data;
        card.el.classList.remove('pending');
        const romanEl = card.el.querySelector('.lyric-roman');
        const enEl = card.el.querySelector('.lyric-en');
        romanEl.classList.remove('spinner-dots');
        enEl.classList.remove('spinner-dots');
        romanEl.textContent = romanMode === 'jyutping' ? (data.jyutping || '') : (data.pinyin || '');
        enEl.textContent = data.english || '';
      }
    } catch (err) {
      const card = cards[job.id];
      if (card) {
        card.el.classList.remove('pending');
        const romanEl = card.el.querySelector('.lyric-roman');
        const enEl = card.el.querySelector('.lyric-en');
        romanEl.classList.remove('spinner-dots');
        enEl.classList.remove('spinner-dots');
        romanEl.textContent = '';
        enEl.textContent = '(translation failed - tap Retry)';
        const retry = document.createElement('button');
        retry.textContent = 'Retry';
        retry.style.cssText = 'margin-top:6px;font-size:12px;padding:4px 12px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--gold);cursor:pointer';
        retry.onclick = () => {
          retry.remove();
          card.el.classList.add('pending');
          enEl.textContent = '';
          enEl.classList.add('spinner-dots');
          romanEl.classList.add('spinner-dots');
          translateQueue.push({ id: job.id, zhText: card.el.querySelector('.lyric-zh').textContent });
          processQueue();
        };
        card.el.appendChild(retry);
      }
    } finally {
      queueBusy = false;
      if (translateQueue.length > 0) processQueue();
    }
  }

  async function translateLine(zhText) {
    const prompt =
      'You are a Cantonese language assistant. For the Cantonese text below (transcribed from audio, may contain recognition errors), respond ONLY with a single JSON object, no markdown, no backticks, in this exact shape:\n' +
      '{"jyutping": "<Jyutping romanization with tone numbers>", "pinyin": "<Mandarin Hanyu Pinyin reading of the same characters, with tone marks>", "english": "<natural English translation>"}\n\n' +
      'Text: ' + zhText;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    });
  }
</script>
</body>
</html>
